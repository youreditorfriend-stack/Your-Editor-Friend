
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Editor Friend | Janish Prabu - Professional Video Editing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@react-three/fiber": "https://aistudiocdn.com/@react-three/fiber@^9.4.0",
    "@react-three/drei": "https://aistudiocdn.com/@react-three/drei@^10.7.7",
    "three": "https://aistudiocdn.com/three@^0.181.1",
    "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.24",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.553.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBqgmzrNelS701uQ1ngLvcoatUkcBuiRic",
        authDomain: "gen-lang-client-0681082317.firebaseapp.com",
        projectId: "gen-lang-client-0681082317",
        appId: "1:834918791822:web:ef4b1dc9724967ab64a7df"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      onSnapshot(doc(db, "websiteData", "video"), (doc) => {
        if (doc.exists()) {
          const data = doc.data();
          if (data.url) {
            const iframe = document.querySelector('iframe');
            if (iframe) {
              iframe.src = data.url;
            }
          }
        }
      });
    </script>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
