<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Video Update</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0a0a0a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #ededed;
        }
        .card {
            background: #141414;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #e50914;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: #c40812;
        }
        button:active {
            transform: scale(0.98);
        }
        .status {
            margin-top: 1rem;
            font-size: 0.85rem;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Update Featured Video</h1>
        <div class="input-group">
            <label for="vLink">YouTube Embed URL</label>
            <input type="text" id="vLink" placeholder="https://www.youtube.com/embed/...">
        </div>
        <button id="upBtn">Update Website</button>
        <div id="status" class="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqgmzrNelS701uQ1ngLvcoatUkcBuiRic",
            authDomain: "gen-lang-client-0681082317.firebaseapp.com",
            projectId: "gen-lang-client-0681082317",
            appId: "1:834918791822:web:ef4b1dc9724967ab64a7df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const vLink = document.getElementById('vLink');
        const upBtn = document.getElementById('upBtn');
        const status = document.getElementById('status');

        upBtn.addEventListener('click', async () => {
            const url = vLink.value.trim();
            
            if (!url.includes("youtube.com/embed/")) {
                alert("Error: The link must contain 'youtube.com/embed/'");
                return;
            }

            upBtn.disabled = true;
            upBtn.textContent = "Updating...";
            status.textContent = "";

            try {
                await setDoc(doc(db, "websiteData", "video"), { url: url });
                status.style.color = "#4ade80";
                status.textContent = "Successfully updated!";
                vLink.value = "";
            } catch (error) {
                console.error("Error updating document: ", error);
                status.style.color = "#f87171";
                status.textContent = "Update failed. Check console.";
            } finally {
                upBtn.disabled = false;
                upBtn.textContent = "Update Website";
            }
        });
    </script>
</body>
</html>
